  </defs>
  <rect x="0" y="0" width="1280" height="440" rx="36" fill="url(#bg)"/>
  <line x1="70" y1="205" x2="338" y2="205" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="20" stroke-linecap="round" filter="url(#soft)"/>
  <line x1="70" y1="205" x2="338" y2="205" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <g filter="url(#soft)" stroke-width="13" stroke-linecap="round" stroke-opacity="0.55">
    <line x1="405" y1="205" x2="720" y2="150" stroke="#FF4D4D"/>
    <line x1="405" y1="205" x2="725" y2="178" stroke="#FF9F45"/>
    <line x1="405" y1="205" x2="728" y2="205" stroke="#FFE14D"/>
    <line x1="405" y1="205" x2="725" y2="232" stroke="#4DD964"/>
    <line x1="405" y1="205" x2="720" y2="258" stroke="#4D9DFF"/>
    <line x1="405" y1="205" x2="712" y2="282" stroke="#B36BFF"/>
  </g>
  <g stroke-width="7" stroke-linecap="round">
    <line x1="405" y1="205" x2="720" y2="150" stroke="#FF4D4D"/>
    <line x1="405" y1="205" x2="725" y2="178" stroke="#FF9F45"/>
    <line x1="405" y1="205" x2="728" y2="205" stroke="#FFE14D"/>
    <line x1="405" y1="205" x2="725" y2="232" stroke="#4DD964"/>
    <line x1="405" y1="205" x2="720" y2="258" stroke="#4D9DFF"/>
    <line x1="405" y1="205" x2="712" y2="282" stroke="#B36BFF"/>
  </g>
  <polygon points="370,108 300,300 440,300" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="3" stroke-linejoin="round"/>
  <text x="770" y="250" font-family="Helvetica, Arial, sans-serif" font-size="150" font-weight="700" letter-spacing="6" fill="#FFFFFF">PRISM</text>
  <text x="775" y="300" font-family="Helvetica, Arial, sans-serif" font-size="29" letter-spacing="2" fill="#9AA4BF">one idea, refracted into many looks</text>
